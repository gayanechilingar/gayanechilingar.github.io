baseURL = 'https://gayanechilingar.github.io'
languageCode = 'en-us'
title = 'My New Hugo Site'


[languages.en]
copyright = "© Gayane Chilingaryan"
languagecode = "en-us"
languagedirection = "ltr"
languagename = "English"
title = "Gayane Chilingaryan"
weight = 10

[languages.en.params.paige.site]
description = "Powerful, pliable pixel perfection"

[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
noclasses = false
style = "github"
[[module.imports]]
path = "github.com/willfaught/paige"

[outputs]
home = ["atom", "html", "paige-search", "rss"]
section = ["atom", "html", "rss"]
taxonomy = ["atom", "html", "rss"]
term = ["atom", "html", "rss"]

[pagination]
pagersize = 5

[params]
customCSS = ["css/custom.css"]

[params.paige]
style = """
  
  
"""

[params.paige.pages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_next = true
disable_prev = true
disable_reading_time = true
disable_series = true
disable_toc = true
disable_word_count = true


[paige.pages.base_schema]
isAccessibleForFree = true
isFamilyFriendly = true

[params.paige.site]
disable_breadcrumbs = true
disable_credit = true

[params.paige.subpages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_reading_time = true
disable_series = true
disable_summary = true
disable_word_count = true

[taxonomies]
author = "authors"
category = "categories"
series = "series"
tag = "tags"
