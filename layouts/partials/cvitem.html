<style>
    .cvcontainer p, .cvcontainer ul, .cvcontainer li {
        margin: 0;
    }
    .cvcontainer {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        margin: 10px 0 15px;
        text-shadow: 0 0 4px var(--cv-shadow-color), 0 0 4px var(--cv-shadow-color), 0 0 4px var(--cv-shadow-color), 0 0 4px var(--cv-shadow-color);
    }
    .cvcontainer.has-logo {
        min-height: calc(var(--tw-cv-logo-width) * 0.8);
    }
    .left-div {
        text-align: left;
        margin-right: 5px;
    }
    .right-div {
        text-align: right;
        margin-left: auto;
        font-size: smaller;
    }
    .third-div {
        width: 90%;
        margin-bottom: 0;
        margin-left: 20px;
        padding: 0;
    }
    .third-div p {
        margin-bottom: 2px;
    }
    #cvrole {
        font-style: italic;
    }

    .logo {
        position: absolute;
        top: -5px;
        left: calc(-1 * var(--tw-cv-logo-width));
        width: var(--tw-cv-logo-width);
        z-index: -1;
        transition: opacity 0.5s ease-in-out;
    }
    .logo img {
        width: 80%;
        margin-right: auto;
        margin-top: 0;
        object-fit: cover;
    }
    @media (max-width: 650px) {
        .logo {
            opacity: 0.4;
            left: calc(-0.5 * var(--tw-cv-logo-width));
            top: 5px;
        }
    }

    .logo .logo-light { display: block; }
    .logo .logo-dark  { display: none; }
    @media (prefers-color-scheme: dark) {
        .logo .logo-light { display: none; }
        .logo .logo-dark  { display: block; }
    }
    [data-bs-theme="dark"] .logo .logo-light { display: none; }
    [data-bs-theme="dark"] .logo .logo-dark  { display: block; }
    [data-bs-theme="light"] .logo .logo-light { display: block; }
    [data-bs-theme="light"] .logo .logo-dark  { display: none; }
</style>

{{ if not .hide }}

<div class="cvcontainer{{ if .logo }} has-logo{{ end }}">
    {{ if .logo }}
    <div style="position: relative; width: 100%; height: 0">
    <div class="logo">
        {{if .url }}<a href="{{.url}}" target="_blank">{{end}}
            {{ if .logo_dark }}
            <img class="logo-light" src="{{ .logo }}" >
            <img class="logo-dark"  src="{{ .logo_dark }}" >
            {{ else }}
            <img src="{{ .logo }}" >
            {{ end }}
        {{if .url }}</a>{{end}}
    </div>
    </div>
    {{ end }}
    <div class="left-div">
        <div>
        <p id="cvcompany">
            {{if .url }}<a href="{{.url}}" class="cvitem-head-link" target="_blank">{{end}}
                <strong>{{ .name }}</strong>
            {{if .url }}</a>{{end}}</p>
        <p id="cvrole">{{ .role }}</p>
        </div>
    </div>
    <div class="right-div">
        <p>{{.date | markdownify}}</p>
        <p>{{.location }}</p>
    </div>
    <div class="third-div">
        {{ .description | markdownify }}
    </div>
    
</div>
{{ end }}
