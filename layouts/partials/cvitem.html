<style>
    .cvcontainer  p, .cvcontainer ul, .cvcontainer li  {
        margin: 0px;
    }
    /* .cvcontainer  p, .cvcontainer ul, .cvcontainer li  {
        margin: 0px;
    } */
    .cvcontainer {display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        margin: 0px;
        margin-top: 10px;
        margin-bottom: 15px;
        text-shadow: 0px 0px 4px  var(--cv-shadow-color),0px 0px 4px  var(--cv-shadow-color),0px 0px 4px  var(--cv-shadow-color),0px 0px 4px  var(--cv-shadow-color);

    }
    .left-div {
        text-align: left;
        margin-right: 5px; /* Add margin to separate the boxes */
    }

    .right-div {
        text-align: right;
        margin-left: auto; /* Auto margin to push the box to the right side */
        font-size: smaller; 

    }
    .third-div {
        width: 90%; /* Set width to 90% */
        margin-bottom: 0px;
        margin-left: 20px;
        /*  font-size: smaller;  */
        padding: 0px;
    }

    .third-div p{
        margin-bottom: 2px;
    }
    #cvrole {
        font-style: italic;
    }


    .logo {
        position: absolute;
        top: -5px;
        left: calc(-1 * var(--tw-cv-logo-width));
        width: var(--tw-cv-logo-width);
        z-index: -1;
        transition: opacity 0.5s ease-in-out;
    }
    .logo img {
        width: 80%;
        margin-right: auto;
        margin-top:0;
        object-fit: cover; /* Ensures the image covers the container */

    }

    @media (max-width: 650px) {
        .logo {
            opacity: 0.4; 
            left: calc( -0.5 * var(--tw-cv-logo-width));
            top: 5px;

        }
    }
</style>

{{ if not .hide }}

<div class="cvcontainer">
    {{ if and .logo true }}
    <div style="position: relative; width: 100%; height: 0">
    <div class="logo">
        {{if .url }}<a href="{{.url}}" target="_blank">{{end}}
            <img src="{{ .logo }}" >
        {{if .url }}</a>{{end}}
    </div>
    </div>
    {{ end }}
    <div class="left-div">
        <div>
        <p id="cvcompany">
            {{if .url }}<a href="{{.url}}" class="cvitem-head-link" target="_blank">{{end}}
                <strong>{{ .name }}</strong>
            {{if .url }}</a>{{end}}</p>
        <p id="cvrole">{{ .role }}</p>
        </div>
    </div>
    <div class="right-div">
        <p>{{.date | markdownify}}</p>
        <p>{{.location }}</p>
    </div>
    <div class="third-div">
        {{ .description | markdownify }}
    </div>
    
</div>
{{ end }}
