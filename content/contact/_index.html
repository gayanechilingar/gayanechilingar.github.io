+++
title = "Contact"
description = "My contact details"
date = "2024-04-30"
author = "Gayane Chilingaryan"
+++

<style>
  .contact-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    max-width: 520px;
    margin: 1.5rem auto 0;
  }

  .contact-card {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    padding: 1.1rem 1.5rem;
    background: var(--bs-tertiary-bg, rgba(255,255,255,0.06));
    border: 1px solid var(--bs-border-color, rgba(255,255,255,0.12));
    border-radius: 0.75rem;
    text-decoration: none;
    color: var(--bs-body-color);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }

  .contact-card:hover {
    background: color-mix(in srgb, var(--bs-link-color, #89b4fa) 15%, var(--bs-tertiary-bg, rgba(255,255,255,0.06)));
    border-color: color-mix(in srgb, var(--bs-link-color, #89b4fa) 40%, var(--bs-border-color, rgba(255,255,255,0.12)));
    color: var(--bs-body-color);
    text-decoration: none;
    transform: translateY(-2px);
  }

  .contact-card .contact-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.75rem;
    height: 2.75rem;
    flex-shrink: 0;
    font-size: 1.35rem;
    border-radius: 50%;
    background: var(--bs-border-color, rgba(255,255,255,0.1));
    transition: background 0.2s, color 0.2s;
  }

  .contact-card:hover .contact-icon {
    background: color-mix(in srgb, var(--bs-link-color, #89b4fa) 25%, var(--bs-border-color, rgba(255,255,255,0.1)));
  }

  .contact-card .contact-details {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .contact-card .contact-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.6;
    line-height: 1.2;
  }

  .contact-card .contact-value {
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    .contact-card {
      padding: 0.9rem 1.15rem;
      gap: 1rem;
    }
    .contact-card .contact-value {
      font-size: 0.9rem;
    }
  }
</style>

{{< contact-grid >}}
